<!-- app/templates/_base.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Exchange System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-gray-100 font-sans">
    <!-- في ملف HTML الخاص بتطبيقك -->



    {% block content %}{% endblock %}

    {% with messages = get_flashed_messages(with_categories=true) %}


    {% if messages %}
    <div class="flex items-center justify-center">
        {% for category, message in messages %}
        <div class="flash-message-{{ category }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/3.0.3/socket.io.js"></script>
    <script>
        var socket = io.connect('http://' + document.domain + ':' + location.port);

        socket.on('transfer_notification', function (data) {
            alert('Transfer Notification:', data.message);
            // قم بتحديث واجهة المستخدم أو إظهار إشعار تنبيه
        });
        socket.on('all_transfer_notification', function (data) {
            alert('Transfer Notification:',data.message, data.transfer,);
            // قم بتحديث واجهة المستخدم أو إظهار إشعار تنبيه
        });
    </script>
</body>

</html>
