<!-- app/templates/openAi.html -->
{% extends '_inc.html' %}
{% block title %}Chat with GPT-3.5 Turbo{% endblock %}
{% block content %}
<div class="bg-gray-100 p-4">
    <div class="max-w-xl mx-auto bg-white p-8 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">Chat with GPT-3.5 Turbo</h1>

        <!-- User message input -->
        <div class="mb-4">
            <label for="userMessage" class="block text-sm font-medium text-gray-600">Your message:</label>
            <input type="text" id="userMessage" name="userMessage"
                class="mt-1 p-2 w-full border border-gray-300 rounded-md focus:outline-none focus:border-blue-500">
        </div>

        <!-- Display GPT-3.5 Turbo response -->
        <div id="response" class="text-gray-800"></div>

        <!-- Submit button -->
        <button id="submitButton"
            class="mt-4 bg-purple-500 text-white p-2 rounded hover:bg-purple-700 focus:outline-none focus:ring focus:border-blue-300">
            Send Message
        </button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#submitButton").click(function () {
                var userMessage = $("#userMessage").val();

                $.post("/get_chat_response", { user_message: userMessage }, function (data) {
                    $("#response").text(data.response);
                });
            });
        });
    </script>
</div>
{% endblock %}
